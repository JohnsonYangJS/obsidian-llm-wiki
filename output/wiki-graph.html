<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki 图谱 — LLM Wiki</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
  canvas { display: block; }

  #panel {
    position: fixed; background: rgba(30,30,60,0.93);
    border: 1px solid #4a4a7a; border-radius: 10px;
    padding: 12px 16px; color: #e0e0ff; font-size: 12px;
    line-height: 1.8; z-index: 10;
  }
  #legend { bottom: 20px; left: 20px; }
  #legend .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; }

  #stats { top: 16px; right: 20px; text-align: right; }
  #stats .num { font-size: 22px; font-weight: 700; color: #9d8fff; }
  #stats .label { color: #888; font-size: 11px; }

  #controls { top: 16px; left: 20px; display: flex; flex-direction: column; gap: 8px; }
  #controls button { background: #2a2a4a; border: 1px solid #6c5cf5; color: #e0e0ff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100px; }
  #controls button:hover { background: #3a3a6a; }

  #search-box { top: 16px; left: 130px; }
  #search-box input { background: #2a2a4a; border: 1px solid #6c5cf5; color: #e0e0ff; padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 200px; outline: none; }
  #search-box input::placeholder { color: #888; }

  #tooltip {
    position: fixed; background: #2a2a4a; border: 1px solid #6c5cf5;
    border-radius: 8px; padding: 10px 14px; color: #e0e0ff; font-size: 13px;
    pointer-events: none; display: none; max-width: 280px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
  }
  #tooltip .title { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #fff; }
  #tooltip .type { font-size: 11px; color: #9d8fff; margin-bottom: 6px; }
  #tooltip .links-to { color: #aaa; font-size: 11px; }
  #tooltip .hint { color: #666; font-size: 11px; margin-top: 4px; font-style: italic; }
</style>
</head>
<body>

<div id="panel" style="bottom:20px;left:20px" id="legend">
  <div><span class="dot" style="background:#6c5cf5"></span>概念页 / 总索引</div>
  <div><span class="dot" style="background:#4eff9c"></span>Summary 摘要页</div>
  <div><span class="dot" style="background:#ff9c4e"></span>指南页</div>
</div>

<div id="panel" style="top:16px;right:20px" id="stats">
  <div class="num" id="nodeCount">0</div><div class="label">个页面</div>
  <div style="font-size:16px;margin-top:4px;color:#9d8fff" id="edgeCount">0</div><div class="label">条链接</div>
</div>

<div id="panel" style="top:16px;left:20px" id="controls">
  <button onclick="resetView()">重置视图</button>
  <button onclick="toggleLabels()">标签切换</button>
  <button onclick="zoomIn()">🔍 放大</button>
  <button onclick="zoomOut()">🔍 缩小</button>
</div>

<div id="panel" style="top:16px;left:130px" id="search-box">
  <input id="search" placeholder="搜索页面…" oninput="onSearch(this.value)">
</div>

<div id="tooltip">
  <div class="title" id="tt-title"></div>
  <div class="type" id="tt-type"></div>
  <div class="links-to" id="tt-links"></div>
  <div class="hint" id="tt-hint"></div>
</div>

<canvas id="canvas"></canvas>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const NODES = [
  {id:"index",label:"总索引",type:"overview",color:"#6c5cf5",size:14},
  {id:"claude-code-guide",label:"Claude Code 指南",type:"concept",color:"#6c5cf5",size:10},
  {id:"hermes-agent",label:"Hermes Agent",type:"concept",color:"#6c5cf5",size:10},
  {id:"llm-wiki-pattern",label:"LLM Wiki 模式",type:"concept",color:"#6c5cf5",size:10},
  {id:"openclaw-guide",label:"OpenClaw 指南",type:"concept",color:"#ff9c4e",size:10},
  {id:"obsidian-ai-guide",label:"Obsidian AI 指南",type:"concept",color:"#6c5cf5",size:9},
  {id:"polymarket-guide",label:"Polymarket 指南",type:"concept",color:"#6c5cf5",size:9},
  {id:"mcp-model-context-protocol",label:"MCP 协议",type:"concept",color:"#6c5cf5",size:9},
  {id:"skills-system",label:"Skills 系统",type:"concept",color:"#6c5cf5",size:9},
  {id:"second-brain",label:"第二大脑",type:"concept",color:"#6c5cf5",size:9},
  {id:"harness-engineering",label:"Harness Engineering",type:"concept",color:"#6c5cf5",size:9},
  {id:"openclaw-vs-claude-code",label:"OpenClaw vs Claude Code",type:"concept",color:"#6c5cf5",size:9},
  {id:"claude-code-complete-guide-zh-v260411",label:"Claude Code 完全指南(中)",type:"summary",color:"#4eff9c",size:7},
  {id:"claude-code-source-analysis-zh-v260411",label:"Claude Code 源码分析(中)",type:"summary",color:"#4eff9c",size:7},
  {id:"claude-code-source-code-analysis-v260411",label:"Claude Code 源码分析",type:"summary",color:"#4eff9c",size:7},
  {id:"claude-code-the-complete-guide-v260411",label:"Claude Code 完全指南",type:"summary",color:"#4eff9c",size:7},
  {id:"hermes-agent-the-complete-guide-v260407",label:"Hermes Agent 完全指南",type:"summary",color:"#4eff9c",size:7},
  {id:"hermes-agent-从入门到精通-v260407",label:"Hermes Agent 从入门到精通",type:"summary",color:"#4eff9c",size:7},
  {id:"openclaw-complete-guide-zh-v140",label:"OpenClaw 完全指南(中)",type:"summary",color:"#4eff9c",size:7},
  {id:"openclaw-the-complete-guide-v260411",label:"OpenClaw 完全指南",type:"summary",color:"#4eff9c",size:7},
  {id:"obsidian-ai-the-complete-guide-v100",label:"Obsidian AI 完全指南",type:"summary",color:"#4eff9c",size:7},
  {id:"obsidian-ai-v100",label:"Obsidian AI 指南(中)",type:"summary",color:"#4eff9c",size:7},
  {id:"polymarket-complete-guide-zh-v200",label:"Polymarket 完全指南(中)",type:"summary",color:"#4eff9c",size:7},
  {id:"polymarket-the-complete-guide-v260411",label:"Polymarket 完全指南",type:"summary",color:"#4eff9c",size:7},
];

const LINKS = [
  {s:"index",t:"claude-code-guide"},{s:"index",t:"hermes-agent"},{s:"index",t:"llm-wiki-pattern"},
  {s:"index",t:"openclaw-guide"},{s:"index",t:"obsidian-ai-guide"},{s:"index",t:"polymarket-guide"},
  {s:"index",t:"second-brain"},{s:"index",t:"mcp-model-context-protocol"},{s:"index",t:"skills-system"},
  {s:"index",t:"harness-engineering"},{s:"index",t:"openclaw-vs-claude-code"},
  {s:"claude-code-guide",t:"hermes-agent"},{s:"claude-code-guide",t:"mcp-model-context-protocol"},
  {s:"claude-code-guide",t:"openclaw-vs-claude-code"},
  {s:"hermes-agent",t:"openclaw-guide"},{s:"hermes-agent",t:"llm-wiki-pattern"},{s:"hermes-agent",t:"claude-code-guide"},
  {s:"llm-wiki-pattern",t:"second-brain"},{s:"llm-wiki-pattern",t:"obsidian-ai-guide"},{s:"llm-wiki-pattern",t:"claude-code-guide"},
  {s:"mcp-model-context-protocol",t:"claude-code-guide"},{s:"mcp-model-context-protocol",t:"openclaw-guide"},
  {s:"mcp-model-context-protocol",t:"llm-wiki-pattern"},{s:"mcp-model-context-protocol",t:"skills-system"},
  {s:"openclaw-guide",t:"hermes-agent"},{s:"openclaw-guide",t:"obsidian-ai-guide"},
  {s:"openclaw-guide",t:"claude-code-guide"},{s:"openclaw-guide",t:"skills-system"},
  {s:"openclaw-vs-claude-code",t:"hermes-agent"},{s:"openclaw-vs-claude-code",t:"openclaw-guide"},
  {s:"openclaw-vs-claude-code",t:"claude-code-guide"},{s:"openclaw-vs-claude-code",t:"skills-system"},
  {s:"obsidian-ai-guide",t:"second-brain"},{s:"obsidian-ai-guide",t:"llm-wiki-pattern"},{s:"obsidian-ai-guide",t:"claude-code-guide"},
  {s:"second-brain",t:"hermes-agent"},{s:"second-brain",t:"openclaw-guide"},
  {s:"second-brain",t:"llm-wiki-pattern"},{s:"second-brain",t:"obsidian-ai-guide"},
  {s:"skills-system",t:"openclaw-guide"},{s:"skills-system",t:"mcp-model-context-protocol"},
  {s:"skills-system",t:"llm-wiki-pattern"},{s:"skills-system",t:"harness-engineering"},
  {s:"harness-engineering",t:"openclaw-guide"},{s:"harness-engineering",t:"llm-wiki-pattern"},
  {s:"harness-engineering",t:"claude-code-guide"},{s:"harness-engineering",t:"skills-system"},
];

// ── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); simulationUpdate(); });

// ── Force Simulation (Vanilla JS) ──────────────────────────────────────────
const NODE_FILE_MAP = {
  "index":"wiki/index.md","claude-code-guide":"wiki/claude-code-guide.md",
  "hermes-agent":"wiki/hermes-agent.md","llm-wiki-pattern":"wiki/llm-wiki-pattern.md",
  "openclaw-guide":"wiki/openclaw-guide.md","obsidian-ai-guide":"wiki/obsidian-ai-guide.md",
  "polymarket-guide":"wiki/polymarket-guide.md","mcp-model-context-protocol":"wiki/mcp-model-context-protocol.md",
  "skills-system":"wiki/skills-system.md","second-brain":"wiki/second-brain.md",
  "harness-engineering":"wiki/harness-engineering.md","openclaw-vs-claude-code":"wiki/openclaw-vs-claude-code.md",
  "claude-code-complete-guide-zh-v260411":"wiki/articles/summaries/claude-code-complete-guide-zh-v260411.md",
  "claude-code-source-analysis-zh-v260411":"wiki/articles/summaries/claude-code-source-analysis-zh-v260411.md",
  "claude-code-source-code-analysis-v260411":"wiki/articles/summaries/claude-code-source-code-analysis-v260411.md",
  "claude-code-the-complete-guide-v260411":"wiki/articles/summaries/claude-code-the-complete-guide-v260411.md",
  "hermes-agent-the-complete-guide-v260407":"wiki/articles/summaries/hermes-agent-the-complete-guide-v260407.md",
  "hermes-agent-从入门到精通-v260407":"wiki/articles/summaries/hermes-agent-从入门到精通-v260407.md",
  "openclaw-complete-guide-zh-v140":"wiki/articles/summaries/openclaw-complete-guide-zh-v140.md",
  "openclaw-the-complete-guide-v260411":"wiki/articles/summaries/openclaw-the-complete-guide-v260411.md",
  "obsidian-ai-the-complete-guide-v100":"wiki/articles/summaries/obsidian-ai-the-complete-guide-v100.md",
  "obsidian-ai-v100":"wiki/articles/summaries/obsidian-ai-v100.md",
  "polymarket-complete-guide-zh-v200":"wiki/articles/summaries/polymarket-complete-guide-zh-v200.md",
  "polymarket-the-complete-guide-v260411":"wiki/articles/summaries/polymarket-the-complete-guide-v260411.md",
};

// Build degree
const degree = {};
NODES.forEach(n => degree[n.id] = 0);
LINKS.forEach(l => { degree[l.s] = (degree[l.s]||0)+1; degree[l.t] = (degree[l.t]||0)+1; });

function nodeRadius(n) { return (n.size + Math.min(degree[n.id],10) * 0.8) * 1.4; }

// Init positions
const simNodes = NODES.map(n => ({
  ...n,
  x: n.x ?? W/2 + (Math.random()-0.5)*400,
  y: n.y ?? H/2 + (Math.random()-0.5)*400,
  vx: 0, vy: 0,
  fx: null, fy: null,
  radius: nodeRadius(n),
}));

const nodeById = {};
simNodes.forEach(n => nodeById[n.id] = n);

const simLinks = LINKS.map(l => ({
  s: nodeById[l.s], t: nodeById[l.t],
  sId: l.s, tId: l.t,
}));

// Stats
document.getElementById('nodeCount').textContent = simNodes.length;
document.getElementById('edgeCount').textContent = simLinks.length;

// ── Simulation ──────────────────────────────────────────────────────────────
let alpha = 1.0, alphaTarget = 0;
const ALPHA_DECAY = 0.025;
const ALPHA_MIN = 0.001;

function simulationStep() {
  if (alpha < ALPHA_MIN && alphaTarget === 0) return;
  alpha = Math.max(alpha * (1 - ALPHA_DECAY), ALPHA_MIN);
  if (alphaTarget !== 0) alpha = Math.max(alpha, alphaTarget);
  alphaTarget = 0;

  // Repulsion between all pairs
  for (let i = 0; i < simNodes.length; i++) {
    const a = simNodes[i];
    for (let j = i+1; j < simNodes.length; j++) {
      const b = simNodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = -600 * alpha / (dist*dist);
      const fx = (dx/dist) * force, fy = (dy/dist) * force;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
  }

  // Attraction along links
  simLinks.forEach(l => {
    const dx = l.t.x - l.s.x, dy = l.t.y - l.s.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ideal = 110, force = (dist - ideal) * 0.08 * alpha;
    const fx = (dx/dist)*force, fy = (dy/dist)*force;
    l.s.vx += fx; l.s.vy += fy; l.t.vx -= fx; l.t.vy -= fy;
  });

  // Center gravity
  simNodes.forEach(n => {
    if (n.fx !== null) { n.x = n.fx; n.vx = 0; return; }
    n.vx += (W/2 - n.x) * 0.005 * alpha;
    n.vy += (H/2 - n.y) * 0.005 * alpha;
  });

  // Velocity damping
  simNodes.forEach(n => {
    if (n.fx !== null) return;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
    // Keep in bounds
    const r = n.radius;
    n.x = Math.max(r, Math.min(W-r, n.x));
    n.y = Math.max(r, Math.min(H-r, n.y));
  });
}

function simulationUpdate() {
  simNodes.forEach(n => {
    if (n.fx !== null) { n.x = n.fx; n.y = n.fy; }
    else { n.x = Math.max(n.radius, Math.min(W-n.radius, n.x)); n.y = Math.max(n.radius, Math.min(H-n.radius, n.y)); }
  });
}

let simRunning = true;
function simLoop() {
  if (simRunning) simulationStep();
  draw();
  requestAnimationFrame(simLoop);
}

// ── Drawing ─────────────────────────────────────────────────────────────────
let labelsVisible = true, zoom = 1, panX = 0, panY = 0;
let hoveredNode = null, draggedNode = null, dragOffX = 0, dragOffY = 0;
let searchQuery = '', searchMatches = new Set();
let highlightedNodes = null;

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Links
  simLinks.forEach(l => {
    const dim = shouldDim(l.s, l.t);
    ctx.beginPath();
    ctx.moveTo(l.s.x, l.s.y);
    ctx.lineTo(l.t.x, l.t.y);
    if (highlightedNodes && (highlightedNodes.has(l.s.id) || highlightedNodes.has(l.t.id))) {
      ctx.strokeStyle = '#9d8fff'; ctx.lineWidth = 2; ctx.globalAlpha = 0.9;
    } else if (dim) {
      ctx.strokeStyle = '#3a3a5a'; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.3;
    } else {
      ctx.strokeStyle = '#5a5a8a'; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.65;
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Nodes
  simNodes.forEach(n => {
    const dim = shouldDimNode(n);
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
    ctx.fillStyle = n.color;
    ctx.globalAlpha = dim ? 0.2 : (hoveredNode===n ? 1 : 0.88);
    ctx.fill();
    ctx.strokeStyle = hoveredNode===n ? '#fff' : (n===draggedNode ? '#fff' : 'rgba(255,255,255,0.6)');
    ctx.lineWidth = hoveredNode===n ? 2.5 : 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Label
    if (labelsVisible && zoom > 0.4) {
      const fontSize = Math.max(9, Math.min(13, n.radius * 0.7));
      ctx.font = `${fontSize}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = dim ? 'rgba(200,200,255,0.2)' : '#e0e0ff';
      ctx.fillText(n.label, n.x, n.y + n.radius + fontSize * 0.9);
    }
  });

  ctx.restore();
}

function shouldDim(s, t) {
  if (!highlightedNodes) return false;
  return !highlightedNodes.has(s.id) && !highlightedNodes.has(t.id);
}
function shouldDimNode(n) {
  if (!highlightedNodes) return searchQuery && !searchMatches.has(n.id);
  return !highlightedNodes.has(n.id);
}

// ── Controls ────────────────────────────────────────────────────────────────
function resetView() { alpha = 1; panX = 0; panY = 0; zoom = 1; }
function toggleLabels() { labelsVisible = !labelsVisible; }
function zoomIn() { zoom = Math.min(3, zoom*1.3); }
function zoomOut() { zoom = Math.max(0.3, zoom/1.3); }
function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  if (!searchQuery) { searchMatches.clear(); highlightedNodes = null; return; }
  searchMatches = new Set(simNodes.filter(n => n.label.toLowerCase().includes(searchQuery) || n.id.includes(searchQuery)).map(n=>n.id));
  highlightedNodes = searchMatches;
}

// ── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttType = document.getElementById('tt-type');
const ttLinks = document.getElementById('tt-links');
const ttHint = document.getElementById('tt-hint');

function getRelated(id) {
  const r = [];
  simLinks.forEach(l => {
    if (l.sId===id) r.push(nodeById[l.tId].label);
    if (l.tId===id) r.push(nodeById[l.sId].label);
  });
  return r;
}

function showTooltip(n, ex, ey) {
  const related = getRelated(n.id);
  const typeNames = {overview:'总索引',concept:'概念页',summary:'摘要页',guide:'指南页'};
  ttTitle.textContent = n.label;
  ttType.textContent = `${typeNames[n.type]||n.type} · ${degree[n.id]} 个链接`;
  ttLinks.textContent = related.length ? `→ ${related.join(', ')}` : '无链接';
  ttHint.textContent = '双击打开 · 拖拽移动';
  tooltip.style.display = 'block';
  tooltip.style.left = (ex + 14) + 'px';
  tooltip.style.top = (ey - 10) + 'px';
  highlightedNodes = new Set([n.id, ...related.map(l => nodeById[l]?.id).filter(Boolean)]);
}
function hideTooltip() { tooltip.style.display = 'none'; highlightedNodes = null; }

// ── Interaction ─────────────────────────────────────────────────────────────
function getCanvasNode(ex, ey) {
  const cx = (ex - panX) / zoom, cy = (ey - panY) / zoom;
  for (let i = simNodes.length-1; i >= 0; i--) {
    const n = simNodes[i];
    const dx = cx-n.x, dy = cy-n.y;
    if (dx*dx+dy*dy <= n.radius*n.radius) return n;
  }
  return null;
}

let rightDown = false, lastPanX = 0, lastPanY = 0;

canvas.addEventListener('mousemove', e => {
  if (draggedNode) {
    draggedNode.x = (e.clientX - panX)/zoom - dragOffX;
    draggedNode.y = (e.clientY - panY)/zoom - dragOffY;
    draggedNode.fx = draggedNode.x; draggedNode.fy = draggedNode.y;
    return;
  }
  if (rightDown) {
    panX += e.clientX - lastPanX; panY += e.clientY - lastPanY;
    lastPanX = e.clientX; lastPanY = e.clientY;
    return;
  }
  const n = getCanvasNode(e.clientX, e.clientY);
  if (n !== hoveredNode) { hoveredNode = n; if (n) showTooltip(n, e.clientX, e.clientY); else hideTooltip(); }
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { rightDown=true; lastPanX=e.clientX; lastPanY=e.clientY; return; }
  const n = getCanvasNode(e.clientX, e.clientY);
  if (n) {
    draggedNode = n;
    dragOffX = (e.clientX - panX)/zoom - n.x;
    dragOffY = (e.clientY - panY)/zoom - n.y;
    n.fx = n.x; n.fy = n.y;
  }
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 2) { rightDown=false; return; }
  if (draggedNode) {
    draggedNode = null;
    alpha = 0.3;
  }
});

canvas.addEventListener('dblclick', e => {
  const n = getCanvasNode(e.clientX, e.clientY);
  if (!n) return;
  const path = NODE_FILE_MAP[n.id];
  if (path) window.location.href = `obsidian://open?vault=Obsidian%20Vault&file=${encodeURIComponent(path)}`;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  zoom = Math.max(0.3, Math.min(3, zoom * factor));
}, { passive: false });

canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Boot ────────────────────────────────────────────────────────────────────
simLoop();
</script>
</body>
</html>
